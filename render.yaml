# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Connect this repo, then Dashboard → New → Blueprint → pick this repo, or paste the YAML.
services:
  - type: web
    name: location-data-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    # Must bind all interfaces + Render's PORT — do NOT use `--reload`.
    startCommand: bash render_start.sh
    healthCheckPath: /
    envVars:
      # runtime.txt alone is skipped if the dashboard/Python build ignores it — set explicitly.
      - key: PYTHON_VERSION
        value: "3.11.9"
