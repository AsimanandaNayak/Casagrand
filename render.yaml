# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Connect this repo, then Dashboard → New → Blueprint → pick this repo, or paste the YAML.
services:
  - type: web
    name: location-data-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
